<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- DARK variant: deep teal-green base so the mark reads on light UI. -->
    <linearGradient id="bg" x1="110" y1="80" x2="890" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15524A"/><stop offset=".4" stop-color="#0D3838"/><stop offset="1" stop-color="#0A2A2E"/>
    </linearGradient>
    <!-- warm corner glow, dialed down for a dark ground -->
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientTransform="translate(810 120) scale(420)">
      <stop stop-color="#FFE7A3" stop-opacity=".28"/><stop offset="1" stop-color="#FFEDC0" stop-opacity="0"/>
    </radialGradient>
    <!-- spirit stays bright (white body pops on dark) with a cool-tinted edge -->
    <linearGradient id="spirit" x1="360" y1="260" x2="680" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/><stop offset=".5" stop-color="#FBFDF4"/><stop offset="1" stop-color="#E7F2DA"/>
    </linearGradient>
    <!-- leaves a touch more vivid -->
    <linearGradient id="leaf" x1="380" y1="170" x2="610" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8FFB0"/><stop offset=".52" stop-color="#7FE6A6"/><stop offset="1" stop-color="#46D6B0"/>
    </linearGradient>
    <!-- signature ring keeps its bright gradient (glows on dark) -->
    <linearGradient id="ring" x1="270" y1="380" x2="760" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5CE6CF"/><stop offset=".5" stop-color="#86E98F"/><stop offset="1" stop-color="#FFE066"/>
    </linearGradient>
    <radialGradient id="cheek"><stop stop-color="#FFAF91" stop-opacity=".72"/><stop offset="1" stop-color="#FFB69A" stop-opacity="0"/></radialGradient>
    <!-- drop shadow goes DARK on a dark ground -->
    <filter id="shadow" x="-35%" y="-35%" width="180%" height="200%">
      <feDropShadow dx="0" dy="28" stdDeviation="25" flood-color="#04201B" flood-opacity=".5"/>
    </filter>
    <filter id="ringGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="11" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <clipPath id="clip"><rect x="38" y="38" width="948" height="948" rx="224"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect x="38" y="38" width="948" height="948" rx="224" fill="url(#bg)"/>
    <rect x="38" y="38" width="948" height="948" rx="224" fill="url(#sun)"/>
    <path d="M38 842C172 753 274 846 409 803C563 753 685 788 802 726C874 688 931 705 986 728V986H38Z" fill="#3FD8B6" opacity=".2"/>
    <path d="M38 902C206 826 321 930 473 865C632 798 779 883 986 783V986H38Z" fill="#2BC4A8" opacity=".16"/>
    <circle cx="142" cy="268" r="108" fill="#7FD9FF" opacity=".14"/>
    <circle cx="860" cy="474" r="145" fill="#8FEBC4" opacity=".16"/>
    <g fill="#FFFDEB" opacity=".8"><circle cx="203" cy="345" r="8"/><circle cx="824" cy="326" r="10"/><circle cx="866" cy="678" r="7"/><circle cx="231" cy="731" r="11"/></g>
    <ellipse cx="512" cy="863" rx="250" ry="42" fill="#04201B" opacity=".35" filter="url(#blur)"/>

    <g filter="url(#shadow)">
      <!-- organic body and soft tail -->
      <path d="M333 399C360 313 434 270 523 272C636 274 720 345 737 455C750 540 717 606 724 684C731 760 691 826 617 854C574 870 522 865 485 845C453 827 429 805 391 790C318 762 276 694 282 619C287 559 309 517 306 463C304 440 313 416 333 399Z" fill="url(#spirit)" stroke="#FFFDF1" stroke-width="12"/>
      <path d="M480 839C506 866 543 878 573 872C555 904 505 930 463 918C478 910 485 898 467 886C444 871 455 850 480 839Z" fill="url(#spirit)"/>

      <!-- leaf sprouts -->
      <path d="M510 283C466 273 421 242 405 193C450 188 496 209 522 260C523 268 519 277 510 283Z" fill="url(#leaf)" stroke="#F6FFE9" stroke-width="8"/>
      <path d="M526 276C528 223 552 173 599 151C611 203 592 251 544 284C536 288 528 284 526 276Z" fill="url(#leaf)" stroke="#F6FFE9" stroke-width="8"/>
      <path d="M516 281C525 250 546 218 574 194" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity=".5"/>

      <!-- face -->
      <g fill="none" stroke="#6C5042" stroke-width="15" stroke-linecap="round">
        <path d="M401 478Q442 428 483 478"/>
        <path d="M555 478Q596 428 637 478"/>
      </g>
      <path d="M495 526C514 545 540 545 559 524" fill="none" stroke="#806052" stroke-width="11" stroke-linecap="round"/>
      <circle cx="383" cy="531" r="45" fill="url(#cheek)"/><circle cx="655" cy="531" r="45" fill="url(#cheek)"/>

      <!-- signature open ring -->
      <circle cx="515" cy="590" r="252" fill="none" stroke="#FFFFFF" stroke-opacity=".74" stroke-width="82" stroke-linecap="round" stroke-dasharray="1280 305" transform="rotate(-48 515 590)"/>
      <circle cx="515" cy="590" r="252" fill="none" stroke="url(#ring)" stroke-width="60" stroke-linecap="round" stroke-dasharray="1280 305" transform="rotate(-48 515 590)" filter="url(#ringGlow)"/>
      <path d="M703 408C719 424 735 443 747 463" fill="none" stroke="#FFE067" stroke-width="60" stroke-linecap="round"/>

      <!-- floating hands hugging the O -->
      <ellipse cx="299" cy="643" rx="62" ry="78" transform="rotate(25 299 643)" fill="url(#spirit)" stroke="#F8F3D9" stroke-width="8"/>
      <ellipse cx="746" cy="650" rx="62" ry="78" transform="rotate(-24 746 650)" fill="url(#spirit)" stroke="#F8F3D9" stroke-width="8"/>
      <path d="M277 621C296 609 317 609 334 619M715 628C733 616 753 617 769 628" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" opacity=".7"/>
    </g>
  </g>
</svg>
