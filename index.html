<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./openbuddy-logo.svg" />
    <title>OpenBuddy</title>
    <!--
      Global base layer — ported from workbuddy/renderer/index.html.
      WorkBuddy injects VS Code theme variables from the host; here we hardcode
      the fallbacks so the page renders standalone in the Tauri webview.
      Actual design tokens (--wb-*) live in src/styles/tokens.css, loaded from main.tsx.
    -->
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background-color: var(--vscode-editor-background, #ffffff);
        color: var(--vscode-editor-foreground, #3b3b3b);
        font-family: var(
          --vscode-font-family,
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif
        );
        font-size: var(--vscode-font-size, 13px);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background-color: var(
          --vscode-scrollbarSlider-background,
          rgba(100, 100, 100, 0.4)
        );
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: var(
          --vscode-scrollbarSlider-hoverBackground,
          rgba(100, 100, 100, 0.7)
        );
      }
      ::-webkit-scrollbar-thumb:active {
        background-color: var(
          --vscode-scrollbarSlider-activeBackground,
          rgba(0, 0, 0, 0.6)
        );
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
