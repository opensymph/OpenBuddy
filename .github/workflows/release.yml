name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: OpenBuddy
  # Align with vendor/grok-build/bin/protoc (dotslash lockfile).
  PROTOC_VERSION: "29.3"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 is deprecated on GitHub-hosted runners; 22 is LTS.
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      # Avoid arduino/setup-protoc — it hits the GitHub Releases API and flakily
      # times out ("We couldn't respond to your request in time"). Download the
      # release asset directly with retries instead.
      - name: Install protoc
        shell: bash
        run: |
          set -euo pipefail
          VER="${PROTOC_VERSION}"
          ASSET="protoc-${VER}-win64.zip"
          URL="https://github.com/protocolbuffers/protobuf/releases/download/v${VER}/${ASSET}"
          DEST="${RUNNER_TEMP}/protoc"
          mkdir -p "$DEST"
          echo "Downloading ${URL}"
          for i in 1 2 3 4 5; do
            if curl -fsSL --retry 3 --retry-delay 2 -o "${DEST}/${ASSET}" "$URL"; then
              break
            fi
            echo "download attempt $i failed; sleeping..."
            sleep $((i * 3))
            if [[ $i -eq 5 ]]; then
              echo "failed to download protoc after 5 attempts"
              exit 1
            fi
          done
          python - <<PY
          import zipfile, pathlib
          dest = pathlib.Path(r"""${DEST}""")
          z = dest / "${ASSET}"
          with zipfile.ZipFile(z) as zf:
              zf.extractall(dest)
          print("extracted to", dest)
          PY
          PROTOC_BIN="${DEST}/bin/protoc.exe"
          test -f "$PROTOC_BIN"
          echo "${DEST}/bin" >> "$GITHUB_PATH"
          echo "PROTOC=${PROTOC_BIN}" >> "$GITHUB_ENV"
          "$PROTOC_BIN" --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc

      - name: Apply grok-build patches
        shell: bash
        run: |
          cd vendor/grok-build
          for patch in ../../patches/grok-build/*.patch; do
            echo "Applying $patch ..."
            git apply --check "$patch" 2>/dev/null && git apply "$patch" || echo "  (already applied or skipped)"
          done

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app (NSIS)
        run: pnpm tauri build --bundles nsis
        env:
          RUSTUP_TOOLCHAIN: stable-x86_64-pc-windows-msvc

      - name: List artifacts
        run: |
          ls src-tauri/target/release/bundle/nsis/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Install protoc
        shell: bash
        run: |
          set -euo pipefail
          VER="${PROTOC_VERSION}"
          ARCH="$(uname -m)"
          case "$ARCH" in
            arm64|aarch64) PLATFORM="osx-aarch_64" ;;
            x86_64|amd64)  PLATFORM="osx-x86_64" ;;
            *) echo "unsupported arch: $ARCH"; exit 1 ;;
          esac
          ASSET="protoc-${VER}-${PLATFORM}.zip"
          URL="https://github.com/protocolbuffers/protobuf/releases/download/v${VER}/${ASSET}"
          DEST="${RUNNER_TEMP}/protoc"
          mkdir -p "$DEST"
          echo "Downloading ${URL}"
          for i in 1 2 3 4 5; do
            if curl -fsSL --retry 3 --retry-delay 2 -o "${DEST}/${ASSET}" "$URL"; then
              break
            fi
            echo "download attempt $i failed; sleeping..."
            sleep $((i * 3))
            if [[ $i -eq 5 ]]; then
              echo "failed to download protoc after 5 attempts"
              exit 1
            fi
          done
          unzip -qo "${DEST}/${ASSET}" -d "$DEST"
          PROTOC_BIN="${DEST}/bin/protoc"
          chmod +x "$PROTOC_BIN"
          test -x "$PROTOC_BIN"
          echo "${DEST}/bin" >> "$GITHUB_PATH"
          echo "PROTOC=${PROTOC_BIN}" >> "$GITHUB_ENV"
          "$PROTOC_BIN" --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Apply grok-build patches
        run: |
          cd vendor/grok-build
          for patch in ../../patches/grok-build/*.patch; do
            echo "Applying $patch ..."
            git apply --check "$patch" 2>/dev/null && git apply "$patch" || echo "  (already applied or skipped)"
          done

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Disable Windows-only rust-toolchain.toml
        run: mv rust-toolchain.toml rust-toolchain.toml.bak

      - name: Build Tauri app (DMG)
        run: pnpm tauri build --bundles dmg
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: List artifacts
        run: |
          ls src-tauri/target/release/bundle/dmg/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ env.APP_NAME }} ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/windows-nsis/*.exe
            artifacts/macos-dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
