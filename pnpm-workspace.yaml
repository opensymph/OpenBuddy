packages:
  - '.'

# pnpm 10+ blocks dependency postinstall scripts by default for security.
# esbuild needs its postinstall to fetch the platform binary; without it vite
# cannot run. Explicitly allowlist it here (pnpm 11 reads this setting from
# pnpm-workspace.yaml, not from the package.json "pnpm" field).
onlyBuiltDependencies:
  - esbuild
